services:
  # =========================================================================
  # Ollama - Local LLM Server (GPU Accelerated)
  # =========================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: auto-traitor-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"   # local only — LLM has no auth
    volumes:
      - ollama_data:/root/.ollama
    environment:
      # Use most of 16GB VRAM, leave ~1GB for system
      - OLLAMA_GPU_MEMORY=15GiB
      # Allow parallel requests for speed
      - OLLAMA_NUM_PARALLEL=2
      # Keep model loaded in memory for fast inference
      - OLLAMA_KEEP_ALIVE=24h
    # NVIDIA GPU support for RTX 5080 16GB
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:11434/api/tags" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # =========================================================================
  # Ollama Model Puller - Ensures the model is downloaded on first run
  # =========================================================================
  ollama-pull:
    image: ollama/ollama:latest
    container_name: auto-traitor-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: [ "ollama", "pull", "${OLLAMA_MODEL:-llama3.1:8b}" ]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  # =========================================================================
  # Redis - State, Message Broker & Cache
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: auto-traitor-redis
    restart: unless-stopped
    env_file:
      - config/.env
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    # Secure Redis: password, disable dangerous commands
    command: >
      sh -c 'redis-server --save 60 1 --loglevel warning --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass "$REDIS_PASSWORD" --rename-command FLUSHDB "" --rename-command FLUSHALL "" --rename-command DEBUG ""'
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================================================
  # Trading Agent - Main Application (Daemon)
  # =========================================================================
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auto-traitor-agent
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - config/.env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - LANGFUSE_HOST=http://langfuse:3000
      - LANGFUSE_PUBLIC_KEY=at-public-key
      - LANGFUSE_SECRET_KEY=at-secret-key
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "8080:8080" # Health check + Prometheus metrics
      - "8090:8090" # LLM Traceability Dashboard
    # Security: read-only filesystem, drop capabilities
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    command: python -m src.main --mode daemon
    # Limit resource usage (leave room for Ollama + system)
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  # =========================================================================
  # News Worker - Background News Aggregation
  # =========================================================================
  news-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auto-traitor-news
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - config/.env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./logs:/app/logs
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    command: python -m src.news.worker
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"

  # =========================================================================
  # Temporal - Durable Workflow Engine (dev server, all-in-one)
  # Hosts the daily/weekly/monthly planning workflows.
  # Web UI: http://localhost:8233
  # =========================================================================
  # =========================================================================
  # Langfuse Postgres — persistent store for LLM traces
  # =========================================================================
  langfuse-db:
    image: postgres:16-alpine
    container_name: auto-traitor-langfuse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD}
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U langfuse" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================================================
  # Langfuse — self-hosted LLM observability & trace UI
  # Dashboard: http://localhost:3000
  # API:       http://localhost:3001
  # =========================================================================
  langfuse:
    image: langfuse/langfuse:latest
    container_name: auto-traitor-langfuse
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"  # Langfuse Web UI — local only
    environment:
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD}@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      NEXTAUTH_URL: http://localhost:3000
      SALT: ${LANGFUSE_SALT}
      LANGFUSE_INIT_ORG_ID: auto-traitor
      LANGFUSE_INIT_ORG_NAME: Auto-Traitor
      LANGFUSE_INIT_PROJECT_ID: trading-agent
      LANGFUSE_INIT_PROJECT_NAME: Trading Agent
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-at-public-key}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-at-secret-key}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_ADMIN_EMAIL:-admin@auto-traitor.local}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_ADMIN_NAME:-admin}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_ADMIN_PASSWORD}
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/api/public/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # =========================================================================
  # Temporal DB — PostgreSQL backend for Temporal workflow engine
  # =========================================================================
  temporal-db:
    image: postgres:16-alpine
    container_name: auto-traitor-temporal-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U temporal" ]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:latest
    container_name: auto-traitor-temporal
    restart: unless-stopped
    depends_on:
      temporal-db:
        condition: service_healthy
    ports:
      - "127.0.0.1:7233:7233"  # gRPC endpoint — local only
      - "127.0.0.1:8233:8233"  # Web UI — local only
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
    healthcheck:
      test: [ "CMD", "temporal", "workflow", "list", "--namespace", "default" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # =========================================================================
  # Planning Worker - Temporal workflow worker for multi-horizon planning
  # Runs DailyPlanWorkflow, WeeklyReviewWorkflow, MonthlyReviewWorkflow
  # =========================================================================
  planning-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auto-traitor-planning
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
      ollama:
        condition: service_healthy
    env_file:
      - config/.env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./logs:/app/logs
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    command: python -m src.planning.worker
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

volumes:
  ollama_data:
  redis_data:
  temporal_db_data:
  langfuse_db_data:
