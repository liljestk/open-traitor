absolute_rules:
  always_use_stop_loss: true
  emergency_stop_portfolio: 80000
  max_cash_per_trade_pct: 0.2
  max_daily_loss: 5000
  max_daily_spend: 20000
  max_portfolio_risk_pct: 0.15
  max_single_trade: 5000
  max_stop_loss_pct: 0.08
  max_trades_per_day: 30
  min_trade_interval_seconds: 120
  never_trade_pairs: []
  only_trade_pairs: []
  require_approval_above: 2000
analysis:
  sentiment:
    enabled: true
    sample_size: 20
  technical:
    bb_period: 20
    bb_std: 2
    candle_count: 200
    candle_granularity: ONE_HOUR
    ema_periods:
    - 9
    - 21
    - 50
    - 200
    macd_fast: 12
    macd_signal: 9
    macd_slow: 26
    rsi_overbought: 70
    rsi_oversold: 30
    rsi_period: 14
audit:
  data_dir: data
  enabled: true
dashboard:
  enabled: true
  langfuse_enabled: true
  langfuse_host: http://localhost:3000
  port: 8090
fear_greed:
  cache_ttl: 600
  enabled: false
fees:
  max_fee_pct: 0.01
  min_fee: 0.35
  min_gain_after_fees_pct: 0.005
  min_trade_quote: 100
  model_type: equity_per_share
  per_share_fee: 0.0035
  safety_margin: 1.5
  swap_cooldown_seconds: 0
health:
  port: 8082
high_stakes:
  auto_approve_up_to: 5000
  min_confidence: 0.55
  min_swap_gain_pct: 0.02
  swap_allocation_multiplier: 1.0
  trade_size_multiplier: 2.0
journal:
  data_dir: data
  enabled: true
llm:
  max_retries: 3
  max_tokens: 2000
  model: llama3.1:8b
  persona: 'You are a cautious, analytical equity trading assistant focused on US
    and global equity markets via Interactive Brokers. You prioritize capital preservation
    over aggressive gains. You always consider risk-reward ratios before suggesting
    trades. You never recommend trading with more than the user''s specified limits.
    When uncertain, you recommend holding or waiting for better setups. '
  providers:
  - api_key_env: GEMINI_API_KEY
    api_key_set: true
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/
    cooldown_seconds: 65
    daily_token_limit: 950000
    enabled: true
    model: gemini-2.0-flash
    name: gemini
    rpm_limit: 14
    tier: free          # change to 'paid' when on a paid Gemini plan
    timeout: 30
  - api_key_env: OPENROUTER_API_KEY
    api_key_set: false
    base_url: https://openrouter.ai/api/v1
    cooldown_seconds: 30
    daily_token_limit: 0
    enabled: true
    model: google/gemini-2.0-flash-exp:free
    name: openrouter
    rpm_limit: 20
    tier: free
    timeout: 45
  - api_key_env: OPENAI_API_KEY
    api_key_set: false
    base_url: https://api.openai.com/v1
    cooldown_seconds: 30
    daily_token_limit: 0
    enabled: true
    model: gpt-4o-mini
    name: openai
    rpm_limit: 450
    tier: free          # change to 'paid' when on a paid OpenAI plan
    timeout: 45
  - api_key_set: true
    base_url_env: OLLAMA_BASE_URL
    enabled: true
    is_local: true
    model: llama3.1:8b
    model_env: OLLAMA_MODEL
    name: ollama
    timeout: 60
  temperature: 0.2
  timeout: 60
logging:
  backup_count: 5
  directory: logs
  file_enabled: true
  level: INFO
  max_file_size: 50
multi_timeframe:
  enabled: true
  min_alignment: 3
news:
  articles_for_analysis: 10
  fetch_interval: 600
  max_articles: 50
  reddit_subreddits:
  - stocks
  - wallstreetbets
  - investing
  - options
  rss_feeds:
  - https://feeds.finance.yahoo.com/rss/2.0/headline
  - https://www.cnbc.com/id/100003114/device/rss/rss.html
risk:
  loss_cooldown_seconds: 600
  max_drawdown_pct: 0.12
  max_position_pct: 0.1
  max_total_exposure_pct: 0.4
  max_trades_per_hour: 6
  stop_loss_pct: 0.06
  take_profit_pct: 0.1
  trailing_stop_pct: 0.05
rotation:
  enabled: false
routing:
  enabled: false
telegram:
  authorized_users_env: TELEGRAM_AUTHORIZED_USERS
  bot_token_env: TELEGRAM_BOT_TOKEN_IBKR
  chat_id_env: TELEGRAM_CHAT_ID_IBKR
  daily_summary: true
  daily_summary_hour: 8
  notify_on_signal_confidence: 0.8
  notify_on_trade: true
  status_update_interval: 3600
trading:
  exchange: ibkr
  holdings_dust_threshold: 0.01
  holdings_refresh_seconds: 120
  include_crypto_quotes: false
  interval: 300
  invalidate_strategic_context: false
  live_holdings_sync: true
  max_active_pairs: 8
  max_open_positions: 10
  min_confidence: 0.6
  mode: paper
  pair_discovery: all
  pair_universe_refresh_seconds: 3600
  pairs:
  - AAPL-USD
  - MSFT-USD
  - GOOGL-USD
  - AMZN-USD
  - NVDA-USD
  paper_slippage_pct: 0.0003
  quote_currencies:
  - USD
  quote_currency: USD
  reconcile_every_cycles: 10
  scan_movement_threshold_pct: 0.5
  scan_volume_threshold: 10000
  screener_interval_cycles: 3
