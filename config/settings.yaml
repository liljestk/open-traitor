trading:
  mode: live
  pair_discovery: all
  quote_currencies:
  - EUR
  - EURC
  pairs:
  - ATOM-EUR
  - BTC-EUR
  - ETH-EUR
  quote_currency: EUR
  interval: 120
  min_confidence: 0.55
  max_open_positions: 8
  reconcile_every_cycles: 10
  paper_slippage_pct: 0.0005
  live_holdings_sync: true
  holdings_refresh_seconds: 60
  holdings_dust_threshold: 0.01
  invalidate_strategic_context: false
  include_crypto_quotes: true
  pair_universe_refresh_seconds: 1800
  max_active_pairs: 5
  scan_volume_threshold: 1000
  scan_movement_threshold_pct: 1.0
  screener_interval_cycles: 5
absolute_rules:
  max_single_trade: 500
  max_daily_spend: 2000
  max_daily_loss: 500
  max_portfolio_risk_pct: 0.2
  require_approval_above: 200
  never_trade_pairs: []
  only_trade_pairs: []
  min_trade_interval_seconds: 60
  max_trades_per_day: 50
  max_cash_per_trade_pct: 0.25
  emergency_stop_portfolio: 8000
  always_use_stop_loss: true
  max_stop_loss_pct: 0.05
risk:
  max_position_pct: 0.05
  max_total_exposure_pct: 0.2
  max_drawdown_pct: 0.1
  stop_loss_pct: 0.04
  take_profit_pct: 0.06
  trailing_stop_pct: 0.03
  max_trades_per_hour: 10
  loss_cooldown_seconds: 300
llm:
  model: llama3.1:8b
  temperature: 0.2
  max_tokens: 2000
  max_retries: 3
  timeout: 60
  recovery_check_interval: 120
  persona: 'You are a cautious, analytical cryptocurrency trading assistant.

    You prioritize capital preservation over aggressive gains.

    You always consider risk-reward ratios before suggesting trades.

    You never recommend trading with more than the user''s specified limits.

    When uncertain, you recommend holding or waiting for better setups.

    '
  providers:
  - name: gemini
    enabled: true
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/
    api_key_env: GEMINI_API_KEY
    model: gemini-2.0-flash
    timeout: 30
    rpm_limit: 14
    daily_token_limit: 950000
    cooldown_seconds: 65
    api_key_set: true
  - name: openai
    enabled: true
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    model: gpt-4o-mini
    timeout: 45
    rpm_limit: 450
    daily_token_limit: 0
    cooldown_seconds: 30
    api_key_set: false
  - name: ollama
    enabled: true
    model: llama3.1:8b
    base_url_env: OLLAMA_BASE_URL
    model_env: OLLAMA_MODEL
    timeout: 60
    is_local: true
    api_key_set: true
analysis:
  technical:
    rsi_period: 14
    rsi_overbought: 70
    rsi_oversold: 30
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    bb_period: 20
    bb_std: 2
    ema_periods:
    - 9
    - 21
    - 50
    - 200
    candle_count: 200
    candle_granularity: ONE_HOUR
  sentiment:
    enabled: true
    sample_size: 20
news:
  fetch_interval: 300
  reddit_subreddits:
  - cryptocurrency
  - bitcoin
  - ethereum
  - CryptoMarkets
  - CryptoMoonShots
  rss_feeds:
  - https://cointelegraph.com/rss
  - https://cryptonews.com/news/feed/
  - https://decrypt.co/feed
  - https://www.coindesk.com/arc/outboundfeeds/rss/
  max_articles: 100
  articles_for_analysis: 15
telegram:
  bot_token_env: TELEGRAM_BOT_TOKEN
  chat_id_env: TELEGRAM_CHAT_ID
  authorized_users_env: TELEGRAM_AUTHORIZED_USERS
  status_update_interval: 3600
  notify_on_trade: true
  notify_on_signal_confidence: 0.8
  daily_summary: true
  daily_summary_hour: 8
logging:
  level: INFO
  file_enabled: true
  directory: logs
  max_file_size: 50
  backup_count: 5
health:
  port: 8080
dashboard:
  enabled: true
  port: 8090
  langfuse_host: http://localhost:3000
  langfuse_enabled: true
fear_greed:
  enabled: true
  cache_ttl: 600
multi_timeframe:
  enabled: true
  min_alignment: 3
journal:
  enabled: true
  data_dir: data
audit:
  enabled: true
  data_dir: data
rotation:
  enabled: true
  autonomous_allocation_pct: 0.1
  min_score_delta: 0.3
  min_confidence: 0.65
  high_impact_confidence: 0.8
  approval_threshold: 200
  swap_cooldown_seconds: 3600
  full_autonomy: true
  llm_validation: true
  llm_validation_temperature: 0.3
fees:
  model_type: crypto_percentage
  trade_fee_pct: 0.006
  maker_fee_pct: 0.004
  safety_margin: 1.5
  min_gain_after_fees_pct: 0.005
  min_trade_quote: 50
  swap_cooldown_seconds: 3600
high_stakes:
  trade_size_multiplier: 2.5
  swap_allocation_multiplier: 2.0
  min_confidence: 0.5
  min_swap_gain_pct: 0.01
  auto_approve_up_to: 500
routing:
  enabled: true
  bridge_currencies:
  - EUR
  - EURC
  - USDC
  - BTC
  min_bridge_volume_24h: 10000
  slippage_factor: 0.001
training_data:
  enabled: true
  include_raw_candles: false
  include_prompts: true
  max_candles_per_snapshot: 50
  buffer_size: 0
