absolute_rules:
  always_use_stop_loss: true
  emergency_stop_portfolio: 0
  max_cash_per_trade_pct: 0.25
  max_daily_loss: 500
  max_daily_spend: 2000
  max_portfolio_risk_pct: 0.2
  max_single_trade: 500
  max_stop_loss_pct: 0.08
  max_trades_per_day: 50
  min_trade_interval_seconds: 60
  never_trade_pairs: []
  only_trade_pairs: []
  require_approval_above: 200
analysis:
  sentiment:
    enabled: true
    sample_size: 20
  technical:
    bb_period: 20
    bb_std: 2
    candle_count: 200
    candle_granularity: ONE_HOUR
    ema_periods:
    - 9
    - 21
    - 50
    - 200
    macd_fast: 12
    macd_signal: 9
    macd_slow: 26
    rsi_overbought: 70
    rsi_oversold: 30
    rsi_period: 14
audit:
  data_dir: data
  enabled: true
dashboard:
  enabled: true
  langfuse_enabled: true
  langfuse_host: http://localhost:3000
  port: 8090
fear_greed:
  cache_ttl: 600
  enabled: true
fees:
  maker_fee_pct: 0.004
  min_gain_after_fees_pct: 0.005
  min_trade_pct: 0.01
  min_trade_quote: 1.0
  model_type: crypto_percentage
  safety_margin: 1.5
  swap_cooldown_seconds: 3600
  trade_fee_pct: 0.006
health:
  port: 8080
high_stakes:
  auto_approve_up_to: 500
  min_confidence: 0.5
  min_swap_gain_pct: 0.01
  swap_allocation_multiplier: 2.0
  trade_size_multiplier: 2.0
journal:
  data_dir: data
  enabled: true
llm:
  max_retries: 3
  max_tokens: 2000
  model: llama3.1:8b
  providers:
  - api_key_env: OPENROUTER_API_KEY
    api_key_set: true
    base_url: https://openrouter.ai/api/v1
    cooldown_seconds: 60
    daily_request_limit: 1000
    daily_token_limit: 0
    enabled: true
    model: meta-llama/llama-3.3-70b-instruct:free
    name: openrouter
    rpm_limit: 20
    tier: free
    timeout: 45
  - api_key_env: GEMINI_API_KEY
    api_key_set: true
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/
    cooldown_seconds: 180
    daily_request_limit: 18
    daily_token_limit: 200000
    enabled: true
    model: gemini-2.5-flash-lite
    name: gemini
    reserve_for_priority: high
    rpm_limit: 8
    tier: free
    timeout: 30
  - api_key_env: OPENROUTER_API_KEY
    api_key_set: true
    base_url: https://openrouter.ai/api/v1
    cooldown_seconds: 30
    daily_request_limit: 0
    daily_token_limit: 0
    enabled: true
    model: meta-llama/llama-3.3-70b-instruct
    name: openrouter-paid
    rpm_limit: 20
    tier: paid
    timeout: 45
  - api_key_env: OPENAI_API_KEY
    api_key_set: false
    base_url: https://api.openai.com/v1
    cooldown_seconds: 30
    daily_token_limit: 0
    enabled: false
    model: gpt-4o-mini
    name: openai
    rpm_limit: 450
    tier: free
    timeout: 45
  - api_key_set: true
    base_url_env: OLLAMA_BASE_URL
    enabled: true
    is_local: true
    model: llama3.1:8b
    model_env: OLLAMA_MODEL
    name: ollama
    timeout: 60
  temperature: 0.2
  timeout: 60
logging:
  backup_count: 5
  directory: logs
  file_enabled: true
  level: INFO
  max_file_size: 50
multi_timeframe:
  enabled: true
  min_alignment: 2
news:
  articles_for_analysis: 15
  fetch_interval: 300
  max_articles: 100
  reddit_subreddits:
  - cryptocurrency
  - bitcoin
  - ethereum
  - CryptoMarkets
  - CryptoMoonShots
  rss_feeds:
  - https://cointelegraph.com/rss
  - https://cryptonews.com/news/feed/
  - https://decrypt.co/feed
  - https://www.coindesk.com/arc/outboundfeeds/rss/
  - https://www.theblock.co/rss.xml
  - https://bitcoinmagazine.com/feed
  - https://cryptoslate.com/feed/
  - https://www.investing.com/rss/news_301.rss
risk:
  loss_cooldown_seconds: 300
  max_drawdown_pct: 0.1
  max_position_pct: 0.4
  max_total_exposure_pct: 0.2
  max_trades_per_hour: 10
  stop_loss_pct: 0.04
  take_profit_pct: 0.08
  trailing_stop_pct: 0.03
rotation:
  approval_threshold: 200
  autonomous_allocation_pct: 0.1
  enabled: true
  full_autonomy: true
  high_impact_confidence: 0.8
  llm_validation: true
  llm_validation_temperature: 0.3
  min_confidence: 0.65
  min_score_delta: 0.3
  swap_cooldown_seconds: 3600
routing:
  bridge_currencies:
  - EUR
  - EURC
  - USDC
  - BTC
  enabled: true
  min_bridge_volume_24h: 10000
  slippage_factor: 0.001
telegram:
  authorized_users_env: TELEGRAM_AUTHORIZED_USERS
  big_loss_threshold: 50
  big_win_threshold: 50
  bot_token_env: TELEGRAM_BOT_TOKEN_COINBASE
  chat_id_env: TELEGRAM_CHAT_ID_COINBASE
  daily_summary: true
  daily_summary_hour: 8
  notify_evening_summary: true
  notify_morning_plan: true
  notify_on_big_loss: true
  notify_on_big_win: true
  notify_on_price_move: false
  notify_on_signal: false
  notify_on_signal_confidence: 0.9
  notify_on_trade: true
  notify_periodic_update: true
  price_move_cooldown_minutes: 20
  price_move_threshold_pct: 5
  status_update_interval: 3600
trading:
  exchange: coinbase
  holdings_dust_threshold: 1.0
  style_modifiers:
  - wider_targets
  holdings_refresh_seconds: 60
  include_crypto_quotes: true
  interval: 600
  invalidate_strategic_context: false
  live_holdings_sync: true
  max_active_pairs: 10
  max_open_positions: 8
  min_confidence: 0.55
  mode: live
  pair_discovery: all
  pair_universe_refresh_seconds: 1800
  pairs:
  - BTC-EUR
  - ETH-EUR
  - SOL-EUR
  - XRP-EUR
  - LINK-EUR
  - ADA-EUR
  paper_slippage_pct: 0.0005
  portfolio_scaling: true
  quote_currencies:
  - EUR
  - EURC
  quote_currency: EUR
  reconcile_every_cycles: 10
  scan_movement_threshold_pct: 1.0
  scan_volume_threshold: 5000.0
  screener_interval_cycles: 5
training_data:
  buffer_size: 0
  enabled: true
  include_prompts: true
  include_raw_candles: false
  max_candles_per_snapshot: 50
